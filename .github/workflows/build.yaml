name: Build & Release 123pan

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v3.0.3)'
        required: true
        type: string
      prerelease:
        description: '是否为预发布版本'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          python-version-file: ".python-version"

      - name: Install dependencies
        working-directory: src
        run: |
          uv sync --locked --all-extras --all-groups --dev

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0

      - name: Build with Nuitka
        # working-directory: src
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            OUTPUT="../123pan.exe"
            EXTRA_ARGS="--windows-disable-console"
          else
            OUTPUT="../123pan"
            EXTRA_ARGS=""
          fi

          uv run -m nuitka 123pan.py \
            --onefile \
            --enable-plugin=pyqt6 \
            --assume-yes-for-downloads \
            --lto=yes \
            --output-filename="$OUTPUT" \
            $EXTRA_ARGS

      # Windows artifact upload
      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: 123pan-windows
          path: 123pan.exe

      # Linux artifact upload
      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: 123pan-linux
          path: 123pan

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download Windows artifact
        if: runner.os == 'Linux'
        uses: actions/download-artifact@v4
        with:
          name: 123pan-windows
          path: ./artifacts/windows

      - name: Download Linux artifact
        if: runner.os == 'Linux'
        uses: actions/download-artifact@v4
        with:
          name: 123pan-linux
          path: ./artifacts/linux

      - name: Set version for manual trigger
        if: github.event_name == 'workflow_dispatch'
        run: echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Set version for push trigger
        if: github.event_name == 'push'
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: |
            ./artifacts/windows/123pan.exe
            ./artifacts/linux/123pan
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: false
