name: Build & Release 123pan

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "是否为预发布版本"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-latest
            artifact: 123pan-windows-x64
            binary: 123pan.exe
          - name: windows-arm64
            runner: windows-11-arm
            artifact: 123pan-windows-arm64
            binary: 123pan.exe
          - name: linux-x64
            runner: ubuntu-latest
            artifact: 123pan-linux-x64
            binary: 123pan
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            artifact: 123pan-linux-arm64
            binary: 123pan
          - name: macos-arm64
            runner: macos-latest
            artifact: 123pan-macos-arm64
            binary: 123pan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --locked --all-extras --all-groups --dev

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxcb-cursor0 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xfixes0 libxcb-xinerama0

      - name: Build with Nuitka
        run: bash script/build.sh
        shell: bash

      - name: Rename artifact
        shell: bash
        run: |
          # Nuitka 输出在项目根目录
          if [[ "${{ matrix.binary }}" == *.exe ]]; then
            mv "${{ matrix.binary }}" "${{ matrix.artifact }}.exe"
          else
            mv "${{ matrix.binary }}" "${{ matrix.artifact }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for commit info)
        uses: actions/checkout@v4

      - name: Determine version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=${SHORT_SHA}" >> "${GITHUB_ENV}"
          echo "TAG_NAME=build-${SHORT_SHA}" >> "${GITHUB_ENV}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: find ./artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Build ${{ env.VERSION }}"
          body: |
            构建自 commit `${{ env.VERSION }}`

            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Windows | x64 | `123pan-windows-x64.exe` |
            | Windows | ARM64 | `123pan-windows-arm64.exe` |
            | Linux | x64 | `123pan-linux-x64` |
            | Linux | ARM64 | `123pan-linux-arm64` |
            | macOS | ARM64 (Apple Silicon) | `123pan-macos-arm64` |
          files: ./artifacts/**/*
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: false
